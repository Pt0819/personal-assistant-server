# 个人AI小助手 — API Server 配置

# JWT 配置
jwt:
  signing-key: "dev-signing-key-change-in-production"
  expires-time: 7d
  buffer-time: 1d
  issuer: "personal-assistant"

# 日志配置
zap:
  level: info
  format: console
  prefix: "[PA-API]"
  director: log
  show-line: true
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  log-in-console: true
  retention-day: -1

# Redis 配置
redis:
  name: default
  useCluster: false
  addr: 127.0.0.1:6379
  password: ""
  db: 0
  clusterAddrs: []

# 系统配置
system:
  env: local
  addr: 8888
  router-prefix: ""
  use-redis: false
  disable-auto-migrate: false

# MySQL 配置
mysql:
  path: 127.0.0.1
  port: "3306"
  config: charset=utf8mb4&parseTime=True&loc=Local
  db-name: personal_assistant
  username: root
  password: ""
  max-idle-conns: 10
  max-open-conns: 100

# 微信小程序配置 (通过环境变量 GVA_WECHAT_APP_ID / GVA_WECHAT_APP_SECRET 注入)
wechat:
  app-id: ""
  app-secret: ""

# Agent Server gRPC 配置
grpc:
  agent-addr: "127.0.0.1:50051"

# OSS 对象存储配置（头像上传）
oss:
  type: local
  endpoint: ""
  access-key-id: ""
  access-key-secret: ""
  bucket-name: ""
  bucket-url: ""
  base-path: "avatars/"
