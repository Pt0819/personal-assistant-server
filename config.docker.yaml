# 个人AI小助手 — API Server Docker 部署配置

jwt:
  signing-key: "change-me-in-production"
  expires-time: 7d
  buffer-time: 1d
  issuer: "personal-assistant"

zap:
  level: info
  format: console
  prefix: "[PA-API]"
  director: log
  show-line: true
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  log-in-console: true
  retention-day: 7

redis:
  name: default
  useCluster: false
  addr: redis:6379
  password: ""
  db: 0
  clusterAddrs: []

system:
  env: production
  addr: 8888
  router-prefix: ""
  use-redis: true
  disable-auto-migrate: false

mysql:
  path: mysql
  port: "3306"
  config: charset=utf8mb4&parseTime=True&loc=Local
  db-name: personal_assistant
  username: root
  password: ""
  max-idle-conns: 10
  max-open-conns: 100

wechat:
  app-id: ""
  app-secret: ""

grpc:
  agent-addr: "agent-server:50051"
