# 个人AI小助手 — API Server Docker 部署配置

jwt:
  signing-key: "change-me-in-production"
  expires-time: 7d
  buffer-time: 1d
  issuer: "personal-assistant"
  refresh-expires-time: 720h

zap:
  level: info
  format: console
  prefix: "[PA-API]"
  director: log
  show-line: true
  encode-level: LowercaseColorLevelEncoder
  stacktrace-key: stacktrace
  log-in-console: true
  retention-day: 7

redis:
  name: default
  useCluster: false
  addr: redis:6379
  password: ""
  db: 0
  clusterAddrs: []

system:
  env: production
  addr: 8888
  router-prefix: ""
  use-redis: true
  disable-auto-migrate: false

mysql:
  path: mysql
  port: "3306"
  config: charset=utf8mb4&parseTime=True&loc=Local
  db-name: personal_assistant
  username: root
  password: ""
  max-idle-conns: 10
  max-open-conns: 100

wechat:
  app-id: ""
  app-secret: ""
  access-token-cache-ttl: 1h50m
  open-platform-app-id: ""
  open-platform-app-secret: ""
  web-redirect-uri: "https://assistant.example.com/api/v1/auth/wechat/web/callback"

grpc:
  agent-addr: "agent-server:50051"

security:
  encryption-key: ""  # 生产必须通过环境变量注入,切勿硬编码
  max-devices: 3

oss:
  type: local
  endpoint: ""
  access-key-id: ""
  access-key-secret: ""
  bucket-name: ""
  bucket-url: ""
  base-path: "avatars/"

# 邮件配置（邮箱验证码）
email:
  provider: mock
  from: "noreply@personal-assistant.app"
  smtp:
    host: ""
    port: 587
    username: ""
    password: ""

# 短信配置（蒙网）
sms:
  provider: mock
  mock:
    fixed-code: "123456"
  montnets:
    api-url: ""
    user-id: ""
    password: ""
    apikey: ""

